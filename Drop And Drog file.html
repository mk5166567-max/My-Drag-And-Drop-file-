<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Drag-and-Drop File Uploader</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <h1>Drag & Drop Image Uploader</h1>
      <p>Drop a JPG, PNG, or GIF image here to upload it.</p>

      <div id="dropZone" class="drop-zone">
        <input type="file" id="fileInput" accept="image/jpeg,image/png,image/gif" hidden />
        <div class="drop-zone__content">
          <div class="drop-zone__icon">📁</div>
          <h2>Drop your image here</h2>
          <p>or</p>
          <button type="button" id="browseBtn">Choose Image</button>
        </div>
      </div>

      <div class="progress-card">
        <div class="progress-meta">
          <span>Uploading</span>
          <span id="progressText">0%</span>
        </div>
        <div class="progress-bar">
          <div id="progressFill" class="progress-bar__fill"></div>
        </div>
      </div>

      <div id="errorMessage" class="error-message" role="alert"></div>

      <div class="preview-card">
        <h3>Preview</h3>
        <img id="previewImage" alt="Uploaded preview" />
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
